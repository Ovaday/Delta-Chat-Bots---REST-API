info:
  name: Import Backup
  type: http
  seq: 24

http:
  method: POST
  url: http://{{BaseURL}}:{{BasePort}}/rpc
  body:
    type: json
    data: |-
      {
        "method": "import_backup",
        "params": [
          {{AccountId}},
          "{{BackupExportPath}}backups1/delta-chat-backup-filepath.tar",
          "{{BackupPassphrase}}"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Example Unauthorized
    request:
      url: http://{{BaseURL}}:{{BasePort}}/health
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: server
          value: BaseHTTP/0.6 Python/3.13.7
        - name: date
          value: Sat, 04 Apr 2026 20:45:21 GMT
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "65"
      body:
        type: json
        data: |-
          {
            "error": "unauthorized",
            "detail": "missing or invalid API key"
          }

