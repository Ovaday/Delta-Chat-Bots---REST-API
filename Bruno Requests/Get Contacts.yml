docs: |-
  getContacts(
      accountId: number,
      listFlags: number,
      query: string | null,
  ): Promise<Contact[]>
  Returns known and unblocked contacts.

  Formerly called getContacts2 in Desktop. See [Self::get_contact_ids] for parameters and more info.

  Parameters
  accountId: number
  listFlags: number
  query: string | null
  Returns Promise<Contact[]>
  Defined in generated/client.ts:1176

  list_flags - A combination of flags:
  DC_GCL_ADD_SELF - Add SELF unless filtered by other parameters. (2)
  DC_GCL_ADDRESS - List address-contacts instead of key-contacts. (1)

  https://js.jsonrpc.delta.chat/classes/RawClient.html#getcontactids
