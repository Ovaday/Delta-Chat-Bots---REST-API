docs: |-
  addContactToChat(
      accountId: number,
      chatId: number,
      contactId: number,
  ): Promise<null>
  Add a member to a group.

  If the group is already promoted (any message was sent to the group), all group members are informed by a special status message that is sent automatically by this function.

  If the group has group protection enabled, only verified contacts can be added to the group.

  Sends out #DC_EVENT_CHAT_MODIFIED and #DC_EVENT_MSGS_CHANGED if a status message was sent.

  Parameters
  accountId: number
  chatId: number
  contactId: number
  Returns Promise<null>
  Defined in generated/client.ts:674

  Note: does not work with Broadcast Channels


  https://js.jsonrpc.delta.chat/classes/RawClient.html#addcontacttochat
