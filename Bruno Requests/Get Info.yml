          value: Sat, 04 Apr 2026 20:45:21 GMT
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "65"
      body:
        type: json
        data: |-
          {
            "error": "unauthorized",
            "detail": "missing or invalid API key"
          }

