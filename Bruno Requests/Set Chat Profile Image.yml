docs: |-
  setChatProfileImage(
      accountId: number,
      chatId: number,
      imagePath: string | null,
  ): Promise<null>
  Set group profile image.

  If the group is already promoted (any message was sent to the group), or if this is a brodacast channel, all members are informed by a special status message that is sent automatically by this function.

  Sends out #DC_EVENT_CHAT_MODIFIED and #DC_EVENT_MSGS_CHANGED if a status message was sent.

  To find out the profile image of a chat, use dc_chat_get_profile_image()

  Parameters
  accountId: number
  chatId: number
  imagePath: string | null
  Returns Promise<null>
  Defined in generated/client.ts:822

  https://js.jsonrpc.delta.chat/classes/RawClient.html#setchatprofileimage
